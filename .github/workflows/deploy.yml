name: Deploy

on:
  push:
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-dev:
    name: Deploy to staging (loresmith-ai-dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Run D1 bootstrap (dev)
        run: ./scripts/d1-bootstrap.sh dev

      - name: Run D1 migrations (dev)
        run: npx wrangler d1 migrations apply loresmith-db-dev --config wrangler.dev.jsonc --remote

      - name: Deploy to loresmith-ai-dev
        run: npx wrangler deploy --config wrangler.dev.jsonc

  deploy-prod:
    name: Deploy to production (loresmith-ai)
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Run D1 migrations (prod)
        run: npx wrangler d1 migrations apply loresmith-db --config wrangler.jsonc --remote

      - name: Deploy to loresmith-ai
        run: npx wrangler deploy --config wrangler.jsonc
