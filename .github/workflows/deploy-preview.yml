# Deploy a preview Worker for each PR. One Worker = same-origin SPA + API (FE + BE).
# Uses shared dev D1/R2/Queues/Vectorize; no migrations run for preview.
name: Deploy preview

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-preview:
    name: Deploy preview for PR ${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set preview URL and worker name
        id: preview
        run: |
          WORKER_NAME="loresmith-ai-preview-${{ github.event.pull_request.number }}"
          # Subdomain from secret or fallback (must match your account's workers.dev subdomain)
          SUBDOMAIN="${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN || 'oren-t-fisk' }}"
          PREVIEW_URL="https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Generate wrangler config for preview
        run: |
          sed -e "s|__PREVIEW_WORKER_NAME__|${{ steps.preview.outputs.worker_name }}|g" \
              -e "s|__PREVIEW_URL__|${{ steps.preview.outputs.preview_url }}|g" \
              wrangler.preview.jsonc > wrangler.preview.generated.jsonc

      - run: npm ci
      - run: VITE_API_URL=${{ steps.preview.outputs.preview_url }} npm run build

      - name: Deploy preview Worker
        run: npx wrangler deploy --config wrangler.preview.generated.jsonc

      # Optional: set JWT_SECRET so the new Worker can auth (add GitHub secret PREVIEW_JWT_SECRET)
      - name: Set preview Worker secrets
        if: secrets.PREVIEW_JWT_SECRET != ''
        env:
          PREVIEW_JWT_SECRET: ${{ secrets.PREVIEW_JWT_SECRET }}
        run: |
          echo "$PREVIEW_JWT_SECRET" | npx wrangler secret put JWT_SECRET --config wrangler.preview.generated.jsonc

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const url = '${{ steps.preview.outputs.preview_url }}';
            const body = `## Preview deployment\n\n**URL:** ${url}\n\nUses shared dev D1/R2/Queues (same data as staging).`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body?.includes('## Preview deployment') && c.user.type === 'Bot');
            const commentBody = body + '\n\n_Deployed from commit ' + context.sha + '_';
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
