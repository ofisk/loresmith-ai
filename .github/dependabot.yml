version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      radix-ui:
        patterns:
          - "@radix-ui/*"
