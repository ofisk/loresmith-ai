name = "loresmith-assistant"
main = "index.js"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# Worker configuration
[env.production]
name = "loresmith-assistant"

# Development configuration  
[env.development]
name = "loresmith-assistant-dev"

# Variables (can be overridden with secrets for sensitive data)
[vars]
ENVIRONMENT = "production"
PDF_AGENT_URL = "https://your-pdf-agent.workers.dev"
DNDBEYOND_AGENT_URL = "https://your-dndbeyond-agent.workers.dev" 